syntax = "proto3";

package seraphine;

option go_package = "github.com/brotherlogic/seraphine/proto";

service SeraphineService {
  rpc GetProjectState(GetProjectStateRequest) returns (GetProjectStateResponse);
  rpc RegisterProject(RegisterProjectRequest) returns (RegisterProjectResponse);
}

message RegisterProjectRequest {
  string project_name = 1;
  string repository_url = 2;
}

message RegisterProjectResponse {
  string version = 1;
}

message GetProjectStateRequest {
  string project_name = 1;
  string current_version = 2;
}

message File {
  string path = 1;
  bytes content = 2;
  bool delete = 3;
}

message GithubSetting {
  string key = 1;
  string value = 2;
}

message GetProjectStateResponse {
  string version = 1;
  repeated File files = 2;
  repeated GithubSetting github_settings = 3;
}

message ProjectConfig {
  string project_name = 1;
  string version = 2;
}

message ServerState {
  repeated string enrolled_repositories = 1;
}

