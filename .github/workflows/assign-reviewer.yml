name: Assign Reviewer

on:
  workflow_run:
    workflows: ["Validate PR"]
    types:
      - completed

permissions:
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Assign brotherlogic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_PAYLOAD: ${{ toJSON(github.event.workflow_run.pull_requests) }}
        run: |
          PR_NUMBER=$(echo "$PR_PAYLOAD" | jq '.[0].number')
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No associated pull request found for this workflow run."
            exit 0
          fi
          echo "Assigning brotherlogic as reviewer for PR #$PR_NUMBER..."
          gh pr edit "$PR_NUMBER" --add-reviewer brotherlogic --repo "${{ github.repository }}"
